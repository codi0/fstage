<!DOCTYPE html>
<html lang="en" class="pwa-splash">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="mobile-web-app-capable" content="yes">
	<meta name="format-detection" content="telephone=no">
	<meta name="msapplication-tap-highlight" content="no">
	<meta name="color-scheme" content="light dark">
	<meta name="theme-color" content="#F7F4EF" media="(prefers-color-scheme: light)">
	<meta name="theme-color" content="#111210" media="(prefers-color-scheme: dark)">
	<title>App loading...</title>

	<!--
		PWA:      serve this file (as index.html) + sw.js from your origin.
		          version.json on your server is the single update trigger for all platforms.

		Capacitor (native): bundle locally — this file + sw.js only.
		          All other assets (fstage, config.mjs, components) are served from
		          REMOTE_ORIGIN and cached by the SW on first load (fully offline after that).
		          Set REMOTE_ORIGIN below before building the native app.

		Triggering an update (PWA + native):
		          Bump the version string in version.json on your server.
		          On next boot the shell detects the change, messages the SW to clear all
		          managed caches, and reloads — identical behaviour on both platforms.
		          No sw.js edit needed.
	-->

	<style>
	:root {
		--pwa-color: #1A1814;
		--pwa-background: #F7F4EF;
		--pwa-font: 'DM Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
		--pwa-font-native: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
	}

	* {
		box-sizing: border-box;
		-webkit-tap-highlight-color: transparent;
	}

	html, body, pwa-app {
		width: 100%;
		height: 100%;
		padding: 0;
		margin: 0;
		color: var(--pwa-color);
		background: var(--pwa-background);
	}

	html.pwa-native,
	html.pwa-native body,
	html.pwa-native pwa-app {
		overflow: hidden;
	}

	body {
		min-width: 320px;
		position: relative;
		font-family: var(--pwa-font);
	}

	html.pwa-native body {
		font-family: var(--pwa-font-native);
	}

	pwa-app { display: block; }

	.pwa-splash body { display: block !important; }

	/* ---- Loader ---- */

	.pwa-loader {
		display: flex;
		align-items: center;
		justify-content: center;
		position: absolute;
		top: 0; left: 0;
		width: 100%;
		height: 100%;
		font-family: inherit;
		background: var(--pwa-background);
		transition: opacity 300ms ease-in-out;
		z-index: 9999;
	}

	.pwa-loader.fading {
		opacity: 0;
		pointer-events: none;
	}

	.pwa-loader-inner {
		display: flex;
		align-items: center;
		justify-content: center;
		max-width: 90%;
	}

	.pwa-unsupported { color: #FF3B30; font-weight: bold; }

	/* ---- Web / PWA splash ---- */

	.pwa-spinner {
		--size: 20px;
		width: var(--size);
		height: var(--size);
		margin: auto;
		border: calc(var(--size) / 5) solid #333;
		border-top: calc(var(--size) / 5) solid #ccc;
		border-radius: 50%;
		animation: pwa-spin 500ms linear infinite;
		display: inline-block;
		vertical-align: middle;
	}

	.pwa-message-none > .pwa-spinner { --size: 80px; }
	.pwa-spinner + .pwa-message { margin-left: 15px; }

	.pwa-logo {
		--size: 100px;
		width: var(--size);
		height: var(--size);
		margin: 0 auto;
		background-image: url('icons/icon-256.webp');
		background-repeat: no-repeat;
		background-position: center;
		background-size: 100%;
	}

	.pwa-logo + .pwa-message,
	.pwa-message-bottom > .pwa-message {
		position: absolute;
		bottom: 40px;
	}

	/* ---- Native splash ---- */

	.pwa-loader-inner.pwa-native-splash { flex-direction: column; }

	.pwa-logo-svg {
		width: 100px;
		height: 100px;
		animation: pwa-pulse 2s ease-in-out infinite;
	}

	.pwa-native-splash .pwa-message {
		margin-top: 20px;
		font-size: 14px;
		text-align: center;
		opacity: 0.6;
	}

	/* ---- Animations ---- */

	@keyframes pwa-spin  { 100% { transform: rotate(360deg); } }
	@keyframes pwa-pulse {
		0%, 100% { transform: scale(1);    opacity: 1;   }
		50%       { transform: scale(0.96); opacity: 0.8; }
	}
	</style>
</head>
<body>
	<div class="pwa-loader">
		<div class="pwa-loader-inner">
			<div class="pwa-message">
				<noscript class="pwa-unsupported">Please enable javascript to continue</noscript>
			</div>
		</div>
	</div>
	<pwa-app></pwa-app>
	<script>
	(function() {

		// -------------------------------------------------------------------------
		// CONFIGURATION
		// Set REMOTE_ORIGIN when building for native (Capacitor).
		// Leave empty for web/PWA — all paths remain relative to the origin.
		// -------------------------------------------------------------------------
		var REMOTE_ORIGIN = ''; // e.g. 'https://app.example.com'

		// -------------------------------------------------------------------------
		// Environment detection
		// -------------------------------------------------------------------------
		var isNative = !!(window.Capacitor && window.Capacitor.isNativePlatform());

		if (isNative) {
			document.documentElement.classList.add('pwa-native');
			// System font used in native — remove font preconnect hints.
			['font-preconnect-1', 'font-preconnect-2'].forEach(function(id) {
				var el = document.getElementById(id);
				if (el) el.parentNode.removeChild(el);
			});
		}

		// Prefix asset paths with REMOTE_ORIGIN in native mode.
		var buildPath = function(path) {
			if (!isNative || !REMOTE_ORIGIN) return path;
			return REMOTE_ORIGIN.replace(/\/$/, '') + '/' + path.replace(/^\//, '');
		};

		// -------------------------------------------------------------------------
		// FSCONFIG
		// sw.js is always local (same-origin SW requirement).
		// config.mjs and all app assets are remote in native, relative in PWA.
		// -------------------------------------------------------------------------
		window.FSCONFIG = {
			rootEl:     'pwa-app',
			loadScreen: isNative ? 'logo-native' : 'spinner',
			swPath:     'sw.js',
			configPath: buildPath('js/config.mjs'),
			scriptPath: buildPath('../../src/js/fstage.mjs') // CDN: https://cdn.jsdelivr.net/gh/codi0/fstage@latest/src/js/fstage.min.mjs
		};

		// -------------------------------------------------------------------------
		// Tests
		// -------------------------------------------------------------------------
		var tests = {
			es6Can: function() {
				try { new Function("(a = 0) => a"); return true; } catch (e) { return false; }
			},
			lsCan: function() {
				var t = 1;
				try { localStorage.setItem(t, t); localStorage.removeItem(t); return true; } catch (e) { return false; }
			},
			swCan:        function() { return !!navigator.serviceWorker; },
			swHas:        function() { return !!(navigator.serviceWorker && navigator.serviceWorker.controller); },
			swInstalling: function() { return tests.swCan() && !tests.swHas() && FSCONFIG.swPath; },
			isDev:        function() { return ['', 'localhost'].includes(location.hostname); },
			online:       function() { return !window.navigator || navigator.onLine !== false; },
			errorPath:    function() {
				var params = new URLSearchParams(location.search);
				var path = params.get('errorPath') || '';
				return (path.indexOf(location.origin) === 0) ? path : '';
			}
		};

		// -------------------------------------------------------------------------
		// Splash
		// -------------------------------------------------------------------------
		var splash = {
			show: function(opts) {
				opts = Object.assign({
					el: document.body, message: '', bottom: null, mode: FSCONFIG.loadScreen
				}, opts || {});

				if (!opts.message) {
					if (!tests.es6Can() || !tests.lsCan()) {
						opts.mode    = 'text';
						opts.message = '<div class="pwa-unsupported">Unfortunately this device is not supported</div>';
					} else if (!tests.online() && !tests.swHas()) {
						opts.message = '<div class="pwa-unsupported">Please connect to the internet to continue</div>';
					} else if (tests.errorPath()) {
						opts.mode    = 'text';
						opts.message = '<div class="pwa-unsupported">An error has occurred. Your device may not be supported.</div>';
					} else {
						opts.message = tests.swInstalling() ? 'App installing...' : 'App loading...';
					}
				}

				if (opts.bottom === null) opts.bottom = (opts.mode === 'logo');

				var loader = opts.el.querySelector('.pwa-loader');
				if (!loader) {
					loader = document.createElement('div');
					loader.className = 'pwa-loader';
					opts.el.insertBefore(loader, opts.el.firstChild);
				}

				if (opts.el === document.body) {
					document.documentElement.classList.add('pwa-splash');
				}

				var html;
				if (opts.mode === 'logo-native') {
					html = '<div class="pwa-loader-inner pwa-native-splash">' +
						'<svg class="pwa-logo-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">' +
							'<rect width="100" height="100" rx="22" fill="var(--pwa-color)"/>' +
							'<path d="M35 30L75 50L35 70V30Z" fill="var(--pwa-background)"/>' +
						'</svg>' +
						'<div class="pwa-message">' + opts.message + '</div>' +
					'</div>';
				} else {
					var pos = !opts.message ? 'none' : (opts.bottom ? 'bottom' : 'top');
					html = '<div class="pwa-loader-inner pwa-message-' + pos + '">';
					if (opts.mode !== 'text') html += '<div class="pwa-' + opts.mode + '"></div>';
					if (opts.message) html += '<div class="pwa-message">' + opts.message + '</div>';
					html += '</div>';
				}

				loader.innerHTML = html;

				// Hand off from native OS splash to web splash seamlessly.
				if (isNative && window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.SplashScreen) {
					requestAnimationFrame(function() {
						setTimeout(function() {
							window.Capacitor.Plugins.SplashScreen.hide({ fadeOutDuration: 300 });
						}, 100);
					});
				}
			},

			hide: function(opts) {
				opts = Object.assign({ el: document.body, delay: 300 }, opts || {});
				var loader = opts.el.querySelector('.pwa-loader');
				loader && setTimeout(function() {
					loader.classList.add('fading');
					if (opts.el === document.body) {
						document.documentElement.classList.remove('pwa-splash');
					}
					setTimeout(function() { loader.remove(); }, 300);
				}, opts.delay);
			}
		};

		// -------------------------------------------------------------------------
		// Load failed
		// -------------------------------------------------------------------------
		var loadFailed = function() {
			var isDev = tests.isDev();
			if (!tests.online()) return;
			splash.show({
				message: 'App install failed...' + (isDev ? ' please debug' : ' re-trying in 5 seconds')
			});
			if (!isDev) setTimeout(function() { location.reload(); }, 5000);
		};

		// -------------------------------------------------------------------------
		// Version check
		//
		// Fetches version.json on every boot (bypassing the SW cache via X-Fetch: true).
		// If a previously stored version exists and differs from the remote value,
		// messages the SW to clear all managed caches and reloads.
		//
		// First boot: version is stored and boot proceeds normally — no extra reload.
		// Subsequent boots: version mismatch triggers cache-clear + reload.
		// Offline: 3-second timeout falls through silently.
		//
		// This is the single update trigger for both PWA and native. No sw.js edit
		// or app store update needed — just bump version.json on the server.
		// -------------------------------------------------------------------------
		var checkVersion = function(callback) {
			var done  = false;
			var finish = function(shouldClear) {
				if (done) return;
				done = true;
				if (!shouldClear) return callback();
				// Message SW to clear all managed caches then reload.
				if (navigator.serviceWorker && navigator.serviceWorker.controller) {
					navigator.serviceWorker.addEventListener('message', function onMsg(e) {
						if (e.data === 'reload') {
							navigator.serviceWorker.removeEventListener('message', onMsg);
							location.reload();
						}
					});
					navigator.serviceWorker.controller.postMessage('clearCaches');
				} else {
					location.reload();
				}
			};

			var timer = setTimeout(function() { finish(false); }, 3000);

			fetch(buildPath('version.json'), { headers: { 'X-Fetch': 'true' }, cache: 'no-store' })
				.then(function(res) { return res.ok ? res.json() : null; })
				.then(function(data) {
					clearTimeout(timer);
					if (!data || !data.version) return finish(false);
					var stored  = localStorage.getItem('appVersion');
					var current = String(data.version);
					// Always persist the latest version.
					localStorage.setItem('appVersion', current);
					// Only clear caches if a previous version existed and changed.
					// On first boot (stored === null) proceed without clearing.
					finish(stored !== null && stored !== current);
				})
				.catch(function() {
					clearTimeout(timer);
					finish(false);
				});
		};

		// -------------------------------------------------------------------------
		// Bootstrap
		// -------------------------------------------------------------------------
		splash.show();

		if (!tests.es6Can() || !tests.lsCan()) return;

		window.FSCONFIG.splash = splash;

		window.addEventListener('load', function() {
			var init = function() {
				var s = document.createElement('script');
				s.src  = FSCONFIG.scriptPath;
				s.type = 'module';
				document.documentElement.firstChild.appendChild(s);
				console.log('PWA load', Math.round(performance.now()));
			};

			var boot = function() {
				// Version check runs before init so a cache-clear + reload happens
				// before any stale assets are loaded.
				checkVersion(function() { init(); });
			};

			if (FSCONFIG.swPath && tests.swCan()) {
				navigator.serviceWorker.register(FSCONFIG.swPath, { type: 'module' }).then(function(reg) {
					var isInstall = !navigator.serviceWorker.controller;
					var sw = function() { return reg.installing || reg.waiting || reg.active; };

					reg.addEventListener('updatefound', function() {
						splash.show({
							message: isInstall ? 'App installing...' : 'App updating...'
						});
						sw().addEventListener('statechange', function() {
							if (this.state === 'activated') {
								localStorage.setItem('swUpdate', 1);
								location.reload();
							}
						});
					});

					boot();
				}).catch(function(err) {
					console.error(err);
					boot();
				});
			} else {
				boot();
			}
		});

		// -------------------------------------------------------------------------
		// Network events
		// -------------------------------------------------------------------------
		window.addEventListener('offline', function() {
			if (!tests.ready) splash.show();
		});

		window.addEventListener('online', function() {
			var url = tests.errorPath() || location.href;
			if (url && !tests.ready) {
				if (url === location.href) location.reload();
				else location.href = url;
			} else {
				splash.hide();
			}
		});

		// -------------------------------------------------------------------------
		// Fstage lifecycle events
		// -------------------------------------------------------------------------
		window.addEventListener('fstage.ready', function() {
			tests.ready = true;
			splash.hide();
			localStorage.removeItem('swUpdate');
			console.log('PWA ready', Math.round(performance.now()));
		});

		window.addEventListener('fstage.failed', loadFailed);

	})();
	</script>
</body>
</html>
