<!DOCTYPE html>
<html lang="en" class="pwa-splash">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="mobile-web-app-capable" content="yes">
	<meta name="format-detection" content="telephone=no">
	<meta name="msapplication-tap-highlight" content="no">
	<meta name="color-scheme" content="light dark">

	<!-- =====================================================================
	     CUSTOMISE: theme colours — match your app's background in light/dark
	     ===================================================================== -->
	<meta name="theme-color" content="#F5F5F3" media="(prefers-color-scheme: light)">
	<meta name="theme-color" content="#111110" media="(prefers-color-scheme: dark)">

	<!-- CUSTOMISE: page title shown during load -->
	<title>My App</title>

	<style>
	/* Splash styles — inline so they render before any external CSS loads.
	   CUSTOMISE: --splash-bg / --splash-color to match your theme colours above. */
	:root {
		--splash-bg:    #F5F5F3;
		--splash-color: #1A1A18;
	}
	@media (prefers-color-scheme: dark) {
		:root { --splash-bg: #111110; --splash-color: #F0EDE8; }
	}

	*, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

	html, body {
		width: 100%; height: 100%; margin: 0; padding: 0;
		background: var(--splash-bg); color: var(--splash-color);
	}

	/* CUSTOMISE: replace 'my-app' with your root element tag */
	my-app { display: block; width: 100%; height: 100%; }

	html.pwa-native,
	html.pwa-native body,
	html.pwa-native my-app { overflow: hidden; }

	body { min-width: 320px; position: relative; }
	html.pwa-native body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }

	/* ---- Loader ---- */
	.pwa-loader {
		display: flex; align-items: center; justify-content: center;
		position: absolute; inset: 0;
		background: var(--splash-bg);
		transition: opacity 300ms ease-in-out;
		z-index: 9999;
	}
	.pwa-loader.fading { opacity: 0; pointer-events: none; }
	.pwa-loader-inner  { display: flex; align-items: center; justify-content: center; max-width: 90%; }
	.pwa-unsupported   { color: #B83232; font-weight: 600; }

	/* Spinner mode */
	.pwa-spinner {
		--size: 24px;
		width: var(--size); height: var(--size);
		border: calc(var(--size) / 5) solid var(--splash-color);
		border-top-color: transparent;
		border-radius: 50%;
		animation: pwa-spin 500ms linear infinite;
		opacity: 0.3;
	}
	.pwa-spinner + .pwa-message { margin-left: 12px; }
	.pwa-message { font-size: 14px; opacity: 0.5; }

	/* Logo mode — image asset */
	.pwa-logo {
		--size: 100px;
		width: var(--size); height: var(--size);
		margin: 0 auto;
		background-image: url('icons/icon.svg');
		background-repeat: no-repeat; background-position: center; background-size: 100%;
	}
	.pwa-logo + .pwa-message,
	.pwa-message-bottom > .pwa-message { position: absolute; bottom: 40px; }
	.pwa-message-none > .pwa-spinner   { --size: 80px; }

	/* Native logo mode — inline SVG, pulses while loading */
	.pwa-loader-inner.pwa-native-splash { flex-direction: column; }
	.pwa-logo-svg { width: 100px; height: 100px; animation: pwa-pulse 2s ease-in-out infinite; }
	.pwa-native-splash .pwa-message { margin-top: 20px; font-size: 14px; text-align: center; opacity: 0.6; }

	@keyframes pwa-spin  { 100% { transform: rotate(360deg); } }
	@keyframes pwa-pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(0.96); opacity: 0.8; } }
	</style>
</head>
<body>

	<div class="pwa-loader">
		<div class="pwa-loader-inner">
			<div class="pwa-message">
				<noscript class="pwa-unsupported">Please enable JavaScript to continue.</noscript>
			</div>
		</div>
	</div>

	<!-- CUSTOMISE: replace 'my-app' with your root element tag (must match above CSS + FSCONFIG.rootEl) -->
	<my-app></my-app>

	<script>
	(function() {

		// =====================================================================
		// CUSTOMISE — the only app-specific values in this file
		// =====================================================================

		// Remote origin for Capacitor native builds.
		// Leave empty for web/PWA — all paths stay relative to the origin.
		// Set to your server URL when building for native: 'https://app.example.com'
		var REMOTE_ORIGIN = '';

		// Root custom element tag — must match the tag in your root layout component
		// and the element in the HTML above.
		var ROOT_EL = 'my-app';

		// Splash / load screen style:
		//   'spinner'     — minimal spinner (default, works everywhere)
		//   'logo'        — shows icons/icon-256.webp; good for installed PWA
		//   'logo-native' — inline SVG logo (see LOGO_SVG below); required for Capacitor
		var LOAD_SCREEN = 'spinner';

		// Inline SVG logo for the native splash screen (LOAD_SCREEN = 'logo-native').
		// Must be inline — no external references until the SW has cached assets.
		// Replace with your own branded SVG. Receives class="pwa-logo-svg".
		var LOGO_SVG = '<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">'
			+ '<rect width="100" height="100" rx="22" fill="var(--splash-color)"/>'
			+ '<path d="M28 50l18 18 28-36" stroke="var(--splash-bg)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>'
			+ '</svg>';

		// fstage loader script path.
		// Development: points to local source (works when serving from repo root).
		// Production:  swap to CDN — https://cdn.jsdelivr.net/gh/codi0/fstage@latest/src/js/fstage.min.mjs
		var SCRIPT_PATH = '../../src/js/fstage.mjs';

		// =====================================================================
		// BOILERPLATE — no need to edit below this line
		// =====================================================================

		var isNative = !!(window.Capacitor && window.Capacitor.isNativePlatform());
		if (isNative) document.documentElement.classList.add('pwa-native');

		var buildPath = function(path) {
			if (!isNative || !REMOTE_ORIGIN) return path;
			return REMOTE_ORIGIN.replace(/\/$/, '') + '/' + path.replace(/^\//, '');
		};

		window.FSCONFIG = {
			rootEl:     ROOT_EL,
			loadScreen: isNative ? 'logo-native' : LOAD_SCREEN,
			swPath:     'sw.js',
			configPath: buildPath('js/config.mjs'),
			scriptPath: buildPath(SCRIPT_PATH),
		};

		// ---- Feature detection ----------------------------------------------

		var tests = {
			es6:          function() { try { new Function('(a=0)=>a'); return true; } catch(e) { return false; } },
			ls:           function() { try { localStorage.setItem(1,1); localStorage.removeItem(1); return true; } catch(e) { return false; } },
			swCan:        function() { return !!navigator.serviceWorker; },
			swHas:        function() { return !!(navigator.serviceWorker && navigator.serviceWorker.controller); },
			swInstalling: function() { return tests.swCan() && !tests.swHas() && !!window.FSCONFIG.swPath; },
			online:       function() { return !window.navigator || navigator.onLine !== false; },
			isDev:        function() { return ['', 'localhost', '127.0.0.1'].includes(location.hostname); },
			errorPath:    function() {
				var p = new URLSearchParams(location.search).get('errorPath') || '';
				return p.indexOf(location.origin) === 0 ? p : '';
			},
		};

		// ---- Splash ---------------------------------------------------------

		var splash = {
			show: function(opts) {
				opts = Object.assign({ message: '', bottom: null, mode: window.FSCONFIG.loadScreen }, opts || {});

				if (!opts.message) {
					if (!tests.es6() || !tests.ls()) {
						opts.mode    = 'text';
						opts.message = '<span class="pwa-unsupported">This device is not supported.</span>';
					} else if (!tests.online() && !tests.swHas()) {
						opts.message = '<span class="pwa-unsupported">Please connect to the internet to continue.</span>';
					} else if (tests.errorPath()) {
						opts.mode    = 'text';
						opts.message = '<span class="pwa-unsupported">An error occurred. Your device may not be supported.</span>';
					} else {
						opts.message = tests.swInstalling() ? 'App installing\u2026' : 'App loading\u2026';
					}
				}

				if (opts.bottom === null) opts.bottom = (opts.mode === 'logo');

				var loader = document.querySelector('.pwa-loader');
				if (!loader) return;

				var html;
				if (opts.mode === 'logo-native') {
					html = '<div class="pwa-loader-inner pwa-native-splash">'
						+ LOGO_SVG.replace('<svg ', '<svg class="pwa-logo-svg" ')
						+ '<div class="pwa-message">' + opts.message + '</div>'
						+ '</div>';
				} else {
					var pos = !opts.message ? 'none' : (opts.bottom ? 'bottom' : 'top');
					html = '<div class="pwa-loader-inner pwa-message-' + pos + '">';
					if (opts.mode !== 'text') html += '<div class="pwa-' + opts.mode + '"></div>';
					if (opts.message) html += '<div class="pwa-message">' + opts.message + '</div>';
					html += '</div>';
				}

				loader.innerHTML = html;
				document.documentElement.classList.add('pwa-splash');

				// Hand off from native OS splash to web splash smoothly.
				if (isNative && window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.SplashScreen) {
					requestAnimationFrame(function() {
						setTimeout(function() {
							window.Capacitor.Plugins.SplashScreen.hide({ fadeOutDuration: 300 });
						}, 100);
					});
				}
			},

			hide: function(opts) {
				opts = Object.assign({ delay: 300 }, opts || {});
				var loader = document.querySelector('.pwa-loader');
				if (!loader) return;
				setTimeout(function() {
					loader.classList.add('fading');
					document.documentElement.classList.remove('pwa-splash');
					setTimeout(function() { loader.remove(); }, 300);
				}, opts.delay);
			},
		};

		// ---- Load failed ----------------------------------------------------

		var loadFailed = function() {
			if (!tests.online()) return;
			var isDev = tests.isDev();
			splash.show({ message: 'App failed to load.' + (isDev ? ' Check the console.' : ' Retrying in 5s\u2026') });
			if (!isDev) setTimeout(function() { location.reload(); }, 5000);
		};

		// ---- Version check --------------------------------------------------
		// Fetches version.json on every boot (bypassing SW cache via X-Fetch header).
		// If the stored version differs, clears all SW caches and reloads.
		// First boot: stores version and proceeds normally.
		// Offline: 3s timeout falls through so cached app still boots.

		var checkVersion = function(callback) {
			var done = false;
			var finish = function(shouldClear) {
				if (done) return;
				done = true;
				if (!shouldClear) return callback();
				if (navigator.serviceWorker && navigator.serviceWorker.controller) {
					navigator.serviceWorker.addEventListener('message', function onMsg(e) {
						if (e.data === 'reload') {
							navigator.serviceWorker.removeEventListener('message', onMsg);
							location.reload();
						}
					});
					navigator.serviceWorker.controller.postMessage('clearCaches');
				} else {
					location.reload();
				}
			};

			var timer = setTimeout(function() { finish(false); }, 3000);

			fetch(buildPath('version.json'), { headers: { 'X-Fetch': 'true' }, cache: 'no-store' })
				.then(function(r) { return r.ok ? r.json() : null; })
				.then(function(data) {
					clearTimeout(timer);
					if (!data || !data.version) return finish(false);
					var stored  = localStorage.getItem('appVersion');
					var current = String(data.version);
					localStorage.setItem('appVersion', current);
					finish(stored !== null && stored !== current);
				})
				.catch(function() { clearTimeout(timer); finish(false); });
		};

		// ---- Bootstrap ------------------------------------------------------

		splash.show();

		if (!tests.es6() || !tests.ls()) return;

		window.FSCONFIG.splash = splash;

		window.addEventListener('load', function() {

			var init = function() {
				var s  = document.createElement('script');
				s.src  = window.FSCONFIG.scriptPath;
				s.type = 'module';
				document.documentElement.firstChild.appendChild(s);
			};

			var boot = function() {
				checkVersion(function() { init(); });
			};

			if (window.FSCONFIG.swPath && tests.swCan()) {
				navigator.serviceWorker.register(window.FSCONFIG.swPath, { type: 'module' })
					.then(function(reg) {
						var isInstall = !navigator.serviceWorker.controller;
						reg.addEventListener('updatefound', function() {
							splash.show({ message: isInstall ? 'App installing\u2026' : 'App updating\u2026' });
							var sw = reg.installing || reg.waiting || reg.active;
							sw.addEventListener('statechange', function() {
								if (this.state === 'activated') {
									localStorage.setItem('swUpdate', 1);
									location.reload();
								}
							});
						});
						boot();
					})
					.catch(function(err) { console.error('SW registration failed', err); boot(); });
			} else {
				boot();
			}
		});

		// ---- Network events -------------------------------------------------

		window.addEventListener('offline', function() {
			if (!tests.ready) splash.show();
		});
		window.addEventListener('online', function() {
			var url = tests.errorPath() || location.href;
			if (!tests.ready) {
				if (url === location.href) location.reload();
				else location.href = url;
			} else {
				splash.hide();
			}
		});

		// ---- fstage lifecycle -----------------------------------------------

		window.addEventListener('fstage.ready', function() {
			tests.ready = true;
			splash.hide();
			localStorage.removeItem('swUpdate');
		});

		window.addEventListener('fstage.failed', loadFailed);

	})();
	</script>

</body>
</html>
